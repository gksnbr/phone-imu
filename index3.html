<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madgwick AHRS Fusion</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; padding: 20px; }
        .container { border: 1px solid #00ff41; padding: 20px; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat { background: #111; padding: 10px; border: 1px solid #222; }
        .label { font-size: 0.7rem; color: #008f11; display: block; margin-bottom: 5px; }
        .value { font-size: 1.2rem; }
        button { width: 100%; padding: 15px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        button:active { background: #008f11; }
        #status { font-size: 0.7rem; color: #ff3333; margin-bottom: 10px; min-height: 1em; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MADGWICK AHRS ENGINE</h2>
        <button id="start">INITIALIZE SENSORS</button>
        <div id="status"></div>

        <div class="data-grid">
            <div class="stat">
                <span class="label">HEADING (YAW)</span>
                <div class="value" id="yaw">0.0°</div>
            </div>
            <div class="stat">
                <span class="label">ATTITUDE (P/R)</span>
                <div class="value" id="att">0.0°, 0.0°</div>
            </div>
            <div class="stat">
                <span class="label">POSITION X,Y (CM)</span>
                <div class="value" id="posXY">0.00, 0.00</div>
            </div>
            <div class="stat">
                <span class="label">VELOCITY (CM/S)</span>
                <div class="value" id="vel">0.00</div>
            </div>
        </div>
    </div>

    <script>
    // ── Inline vec3 helpers ──────────────────────────────────────
    const V3 = {
        create: () => [0, 0, 0],
        from: (x, y, z) => [x, y, z],
        len: (v) => Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]),
        scale: (out, v, s) => { out[0]=v[0]*s; out[1]=v[1]*s; out[2]=v[2]*s; return out; },
        add: (out, a, b) => { out[0]=a[0]+b[0]; out[1]=a[1]+b[1]; out[2]=a[2]+b[2]; return out; },
        transformQuat: (out, v, q) => {
            const x=v[0], y=v[1], z=v[2];
            const qx=q[0], qy=q[1], qz=q[2], qw=q[3];
            const ix = qw*x + qy*z - qz*y;
            const iy = qw*y + qz*x - qx*z;
            const iz = qw*z + qx*y - qy*x;
            const iw = -qx*x - qy*y - qz*z;
            out[0] = ix*qw + iw*-qx + iy*-qz - iz*-qy;
            out[1] = iy*qw + iw*-qy + iz*-qx - ix*-qz;
            out[2] = iz*qw + iw*-qz + ix*-qy - iy*-qx;
            return out;
        }
    };

    // ── Inline Madgwick AHRS filter ──────────────────────────────
    class MadgwickAHRS {
        constructor(beta = 0.4) {
            this.beta = beta;
            this.q = [1, 0, 0, 0]; // w, x, y, z
        }

        update(gx, gy, gz, ax, ay, az, dt) {
            let [qw, qx, qy, qz] = this.q;

            let norm = Math.sqrt(ax*ax + ay*ay + az*az);
            if (norm === 0) return;
            ax /= norm; ay /= norm; az /= norm;

            const _2qw=2*qw, _2qx=2*qx, _2qy=2*qy, _2qz=2*qz;
            const _4qw=4*qw, _4qx=4*qx, _4qy=4*qy;
            const _8qx=8*qx, _8qy=8*qy;
            const qwqw=qw*qw, qxqx=qx*qx, qyqy=qy*qy, qzqz=qz*qz;

            let s0 = _4qw*qyqy + _2qy*ax + _4qw*qxqx - _2qx*ay;
            let s1 = _4qx*qzqz - _2qz*ax + 4*qwqw*qx - _2qw*ay - _4qx + _8qx*qxqx + _8qx*qyqy + _4qx*az;
            let s2 = 4*qwqw*qy + _2qw*ax + _4qy*qzqz - _2qz*ay - _4qy + _8qy*qxqx + _8qy*qyqy + _4qy*az;
            let s3 = 4*qxqx*qz - _2qx*ax + 4*qyqy*qz - _2qy*ay;

            norm = Math.sqrt(s0*s0 + s1*s1 + s2*s2 + s3*s3);
            if (norm > 0) { s0/=norm; s1/=norm; s2/=norm; s3/=norm; }

            const qDot0 = 0.5*(-qx*gx - qy*gy - qz*gz) - this.beta*s0;
            const qDot1 = 0.5*( qw*gx + qy*gz - qz*gy) - this.beta*s1;
            const qDot2 = 0.5*( qw*gy - qx*gz + qz*gx) - this.beta*s2;
            const qDot3 = 0.5*( qw*gz + qx*gy - qy*gx) - this.beta*s3;

            qw += qDot0*dt; qx += qDot1*dt; qy += qDot2*dt; qz += qDot3*dt;
            norm = Math.sqrt(qw*qw + qx*qx + qy*qy + qz*qz);
            this.q = [qw/norm, qx/norm, qy/norm, qz/norm];
        }

        getQuatConjXYZW() {
            const [w, x, y, z] = this.q;
            return [-x, -y, -z, w];
        }

        getEulerDeg() {
            const [w, x, y, z] = this.q;
            const sinr = 2*(w*x + y*z), cosr = 1 - 2*(x*x + y*y);
            const roll = Math.atan2(sinr, cosr);
            const sinp = 2*(w*y - z*x);
            const pitch = Math.abs(sinp) >= 1 ? Math.sign(sinp)*Math.PI/2 : Math.asin(sinp);
            const siny = 2*(w*z + x*y), cosy = 1 - 2*(y*y + z*z);
            const yaw = Math.atan2(siny, cosy);
            const d = 180/Math.PI;
            return { pitch: pitch*d, roll: roll*d, yaw: yaw*d };
        }
    }

    // ── Main app ─────────────────────────────────────────────────
    const statusEl = document.getElementById('status');
    const madgwick = new MadgwickAHRS(0.4);

    let position = [0, 0, 0];
    let velocity = [0, 0, 0];
    let lastT = 0;
    const ZUPT_LIMIT = 0.12;

    const HP_ALPHA = 0.8;
    let grav = null;

    document.getElementById('start').onclick = async () => {
        try {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function')
                await DeviceMotionEvent.requestPermission();
        } catch(e) { statusEl.innerText = 'Permission error: ' + e.message; }
        document.getElementById('start').style.display = 'none';
        statusEl.innerText = 'Waiting for sensor data...';
        window.addEventListener('devicemotion', onMotion);
    };

    function getLinearAccel(event) {
        if (event.acceleration && event.acceleration.x != null)
            return V3.from(event.acceleration.x, event.acceleration.y, event.acceleration.z);

        const ag = event.accelerationIncludingGravity;
        if (!ag || ag.x == null) return null;
        if (!grav) grav = { x: ag.x, y: ag.y, z: ag.z };

        grav.x = HP_ALPHA * grav.x + (1 - HP_ALPHA) * ag.x;
        grav.y = HP_ALPHA * grav.y + (1 - HP_ALPHA) * ag.y;
        grav.z = HP_ALPHA * grav.z + (1 - HP_ALPHA) * ag.z;

        return V3.from(ag.x - grav.x, ag.y - grav.y, ag.z - grav.z);
    }

    function onMotion(event) {
        const now = performance.now();
        if (lastT === 0) { lastT = now; return; }
        const dt = (now - lastT) / 1000;
        lastT = now;

        const gr = event.rotationRate;
        const acc = event.accelerationIncludingGravity;
        if (!gr || !acc) { statusEl.innerText = 'No sensor data'; return; }
        if (gr.alpha == null || acc.x == null) { statusEl.innerText = 'Null sensor values'; return; }

        statusEl.innerText = '';

        madgwick.update(
            gr.alpha * (Math.PI/180),
            gr.beta  * (Math.PI/180),
            gr.gamma * (Math.PI/180),
            acc.x, acc.y, acc.z, dt
        );

        const linAcc = getLinearAccel(event);
        if (!linAcc) return;

        const linWorld = V3.create();
        V3.transformQuat(linWorld, linAcc, madgwick.getQuatConjXYZW());

        if (V3.len(linAcc) < ZUPT_LIMIT) {
            V3.scale(velocity, velocity, 0.9);
        } else {
            const dv = V3.create();
            V3.scale(dv, linWorld, dt);
            V3.add(velocity, velocity, dv);
        }

        const dp = V3.create();
        V3.scale(dp, velocity, dt);
        V3.add(position, position, dp);

        render();
    }

    function render() {
        const e = madgwick.getEulerDeg();
        document.getElementById('yaw').innerText = e.yaw.toFixed(1) + '°';
        document.getElementById('att').innerText = `${e.pitch.toFixed(1)}°, ${e.roll.toFixed(1)}°`;
        document.getElementById('posXY').innerText = `${(position[0]*100).toFixed(1)}, ${(position[1]*100).toFixed(1)}`;
        document.getElementById('vel').innerText = (V3.len(velocity)*100).toFixed(1) + ' cm/s';
    }
    </script>
</body>
</html>
