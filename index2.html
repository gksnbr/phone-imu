<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMU 6-DOF Real-time Telemetry</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 10px; }
        canvas { width: 100%; background: #1e1e1e; border-radius: 8px; margin-bottom: 12px; display: block; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .stats { display: flex; justify-content: space-around; font-family: monospace; font-size: 0.8rem; color: #00ff00; margin-bottom: 10px; }
        #status { font-size: 0.75rem; color: #ff5555; margin-bottom: 10px; font-family: monospace; min-height: 1.2em; }
        .chart-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <button id="start">START TELEMETRY</button>
    <div id="status"></div>

    <div class="stats">
        <div id="posVal">POS: 0, 0, 0 cm</div>
        <div id="angVal">ANG: 0, 0, 0</div>
    </div>

    <div class="chart-label">POSITION (cm) — <span style="color:#ff5555">X</span> <span style="color:#55ff55">Y</span> <span style="color:#5555ff">Z</span></div>
    <canvas id="posChart" height="200"></canvas>

    <div class="chart-label">ANGLES (°) — <span style="color:#ffcc00">Pitch</span> <span style="color:#00cccc">Roll</span> <span style="color:#ff00ff">Yaw</span></div>
    <canvas id="angChart" height="200"></canvas>

    <script>
    // ── Inline vec3 helpers ──────────────────────────────────────
    const V3 = {
        create: () => [0, 0, 0],
        from: (x, y, z) => [x, y, z],
        len: (v) => Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]),
        scale: (out, v, s) => { out[0]=v[0]*s; out[1]=v[1]*s; out[2]=v[2]*s; return out; },
        add: (out, a, b) => { out[0]=a[0]+b[0]; out[1]=a[1]+b[1]; out[2]=a[2]+b[2]; return out; },
        transformQuat: (out, v, q) => {
            const x=v[0], y=v[1], z=v[2];
            const qx=q[0], qy=q[1], qz=q[2], qw=q[3];
            const ix = qw*x + qy*z - qz*y;
            const iy = qw*y + qz*x - qx*z;
            const iz = qw*z + qx*y - qy*x;
            const iw = -qx*x - qy*y - qz*z;
            out[0] = ix*qw + iw*-qx + iy*-qz - iz*-qy;
            out[1] = iy*qw + iw*-qy + iz*-qx - ix*-qz;
            out[2] = iz*qw + iw*-qz + ix*-qy - iy*-qx;
            return out;
        }
    };

    // ── Inline Madgwick AHRS ─────────────────────────────────────
    class MadgwickAHRS {
        constructor(beta = 0.4) {
            this.beta = beta;
            this.q = [1, 0, 0, 0];
        }
        update(gx, gy, gz, ax, ay, az, dt) {
            let [qw, qx, qy, qz] = this.q;
            let norm = Math.sqrt(ax*ax + ay*ay + az*az);
            if (norm === 0) return;
            ax /= norm; ay /= norm; az /= norm;
            const _2qw=2*qw, _2qx=2*qx, _2qy=2*qy, _2qz=2*qz;
            const _4qw=4*qw, _4qx=4*qx, _4qy=4*qy;
            const _8qx=8*qx, _8qy=8*qy;
            const qwqw=qw*qw, qxqx=qx*qx, qyqy=qy*qy, qzqz=qz*qz;
            let s0 = _4qw*qyqy + _2qy*ax + _4qw*qxqx - _2qx*ay;
            let s1 = _4qx*qzqz - _2qz*ax + 4*qwqw*qx - _2qw*ay - _4qx + _8qx*qxqx + _8qx*qyqy + _4qx*az;
            let s2 = 4*qwqw*qy + _2qw*ax + _4qy*qzqz - _2qz*ay - _4qy + _8qy*qxqx + _8qy*qyqy + _4qy*az;
            let s3 = 4*qxqx*qz - _2qx*ax + 4*qyqy*qz - _2qy*ay;
            norm = Math.sqrt(s0*s0 + s1*s1 + s2*s2 + s3*s3);
            if (norm > 0) { s0/=norm; s1/=norm; s2/=norm; s3/=norm; }
            const qDot0 = 0.5*(-qx*gx - qy*gy - qz*gz) - this.beta*s0;
            const qDot1 = 0.5*( qw*gx + qy*gz - qz*gy) - this.beta*s1;
            const qDot2 = 0.5*( qw*gy - qx*gz + qz*gx) - this.beta*s2;
            const qDot3 = 0.5*( qw*gz + qx*gy - qy*gx) - this.beta*s3;
            qw += qDot0*dt; qx += qDot1*dt; qy += qDot2*dt; qz += qDot3*dt;
            norm = Math.sqrt(qw*qw + qx*qx + qy*qy + qz*qz);
            this.q = [qw/norm, qx/norm, qy/norm, qz/norm];
        }
        getQuatConjXYZW() { const [w,x,y,z] = this.q; return [-x,-y,-z,w]; }
        getEulerDeg() {
            const [w,x,y,z] = this.q;
            const roll = Math.atan2(2*(w*x+y*z), 1-2*(x*x+y*y));
            const sinp = 2*(w*y-z*x);
            const pitch = Math.abs(sinp)>=1 ? Math.sign(sinp)*Math.PI/2 : Math.asin(sinp);
            const yaw = Math.atan2(2*(w*z+x*y), 1-2*(y*y+z*z));
            const d = 180/Math.PI;
            return { pitch:pitch*d, roll:roll*d, yaw:yaw*d };
        }
    }

    // ── Simple scrolling chart ───────────────────────────────────
    class LineChart {
        constructor(canvasId, colors, maxPoints) {
            this.canvas = document.getElementById(canvasId);
            this.ctx = this.canvas.getContext('2d');
            this.colors = colors;
            this.max = maxPoints;
            this.series = colors.map(() => []);
            this.resize();
            window.addEventListener('resize', () => this.resize());
        }
        resize() {
            const rect = this.canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            this.canvas.width = rect.width * dpr;
            this.canvas.height = rect.height * dpr;
            this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            this.w = rect.width;
            this.h = rect.height;
        }
        push(values) {
            for (let i = 0; i < values.length; i++) {
                this.series[i].push(values[i]);
                if (this.series[i].length > this.max) this.series[i].shift();
            }
        }
        draw() {
            const ctx = this.ctx, w = this.w, h = this.h;
            ctx.clearRect(0, 0, w, h);

            // Find y range across all series
            let min = Infinity, max = -Infinity;
            for (const s of this.series) {
                for (const v of s) { if (v < min) min = v; if (v > max) max = v; }
            }
            if (min === max) { min -= 1; max += 1; }
            const pad = (max - min) * 0.1 || 1;
            min -= pad; max += pad;

            // Grid lines
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            const midY = h / 2;
            ctx.beginPath();
            ctx.moveTo(0, midY); ctx.lineTo(w, midY);
            ctx.stroke();

            // Zero line
            const zeroY = h - ((0 - min) / (max - min)) * h;
            ctx.strokeStyle = '#555';
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(0, zeroY); ctx.lineTo(w, zeroY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Y-axis labels
            ctx.fillStyle = '#666';
            ctx.font = '10px monospace';
            ctx.fillText(max.toFixed(1), 4, 12);
            ctx.fillText(min.toFixed(1), 4, h - 4);

            // Draw each series
            const n = this.series[0].length;
            if (n < 2) return;
            const dx = w / (this.max - 1);

            for (let si = 0; si < this.series.length; si++) {
                const s = this.series[si];
                ctx.strokeStyle = this.colors[si];
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let i = 0; i < s.length; i++) {
                    const x = (this.max - s.length + i) * dx;
                    const y = h - ((s[i] - min) / (max - min)) * h;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }
    }

    // ── Main app ─────────────────────────────────────────────────
    const statusEl = document.getElementById('status');
    const madgwick = new MadgwickAHRS(0.4);

    let position = [0, 0, 0];
    let velocity = [0, 0, 0];
    let lastT = 0;
    const MAX_POINTS = 150;

    const HP_ALPHA = 0.8;
    let gravity = null;

    const posChart = new LineChart('posChart', ['#ff5555','#55ff55','#5555ff'], MAX_POINTS);
    const angChart = new LineChart('angChart', ['#ffcc00','#00cccc','#ff00ff'], MAX_POINTS);

    let frameCount = 0;

    document.getElementById('start').onclick = async () => {
        try {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function')
                await DeviceMotionEvent.requestPermission();
        } catch(e) { statusEl.innerText = 'Permission error: ' + e.message; }
        document.getElementById('start').style.display = 'none';
        statusEl.innerText = 'Waiting for sensor data...';
        window.addEventListener('devicemotion', onMotion);
    };

    function getLinearAccel(event) {
        if (event.acceleration && event.acceleration.x != null)
            return V3.from(event.acceleration.x, event.acceleration.y, event.acceleration.z);
        const ag = event.accelerationIncludingGravity;
        if (!ag || ag.x == null) return null;
        if (!gravity) gravity = { x: ag.x, y: ag.y, z: ag.z };
        gravity.x = HP_ALPHA * gravity.x + (1 - HP_ALPHA) * ag.x;
        gravity.y = HP_ALPHA * gravity.y + (1 - HP_ALPHA) * ag.y;
        gravity.z = HP_ALPHA * gravity.z + (1 - HP_ALPHA) * ag.z;
        return V3.from(ag.x - gravity.x, ag.y - gravity.y, ag.z - gravity.z);
    }

    function onMotion(event) {
        const now = performance.now();
        if (lastT === 0) { lastT = now; return; }
        const dt = (now - lastT) / 1000;
        lastT = now;

        const gr = event.rotationRate;
        const acc = event.accelerationIncludingGravity;
        if (!gr || !acc) { statusEl.innerText = 'No sensor data'; return; }
        if (gr.alpha == null || acc.x == null) { statusEl.innerText = 'Null sensor values'; return; }

        statusEl.innerText = '';

        madgwick.update(
            gr.alpha * (Math.PI/180),
            gr.beta  * (Math.PI/180),
            gr.gamma * (Math.PI/180),
            acc.x, acc.y, acc.z, dt
        );

        const linAcc = getLinearAccel(event);
        if (!linAcc) return;

        const linWorld = V3.create();
        V3.transformQuat(linWorld, linAcc, madgwick.getQuatConjXYZW());

        if (V3.len(linAcc) < 0.15) {
            V3.scale(velocity, velocity, 0.9);
        } else {
            const dv = V3.create();
            V3.scale(dv, linWorld, dt);
            V3.add(velocity, velocity, dv);
        }

        const dp = V3.create();
        V3.scale(dp, velocity, dt);
        V3.add(position, position, dp);

        const euler = madgwick.getEulerDeg();

        // Push data in cm
        posChart.push([position[0]*100, position[1]*100, position[2]*100]);
        angChart.push([euler.pitch, euler.roll, euler.yaw]);

        // Throttle canvas redraws to ~20fps for performance
        frameCount++;
        if (frameCount % 3 === 0) {
            posChart.draw();
            angChart.draw();
        }

        document.getElementById('posVal').innerText = `POS: ${(position[0]*100).toFixed(1)}, ${(position[1]*100).toFixed(1)}, ${(position[2]*100).toFixed(1)} cm`;
        document.getElementById('angVal').innerText = `ANG: ${Math.round(euler.pitch)}, ${Math.round(euler.roll)}, ${Math.round(euler.yaw)}`;
    }
    </script>
</body>
</html>
